services:
  - type: web
    name: gymeasure-api
    runtime: node
    plan: free
    rootDir: .
    buildCommand: npm install --include=dev && npm run build -w @gymeasure/shared && npm run build -w @gymeasure/api
    startCommand: npm run start -w @gymeasure/api
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_SSL
        value: "true"
      - key: PUBLIC_API_URL
        sync: false
      - key: ALLOW_CATALOG_IMPORT
        value: "false"
      - key: GOOGLE_WEB_CLIENT_ID
        sync: false
      - key: GOOGLE_ANDROID_CLIENT_ID
        sync: false
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET
        sync: false
      - key: R2_PUBLIC_BASE_URL
        sync: false
